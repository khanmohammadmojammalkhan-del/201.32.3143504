<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCLAF eFootball Pro Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        body {
            background: #050505;
            color: white;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ব্যাকগ্রাউন্ড ফুটবল অ্যানিমেশন */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #112244 0%, #000 100%);
        }

        .football {
            position: absolute;
            width: 100px; opacity: 0.1;
            animation: bounce 10s infinite linear;
        }

        @keyframes bounce {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(80vw, 20vh) rotate(90deg); }
            50% { transform: translate(20vw, 80vh) rotate(180deg); }
            75% { transform: translate(0vw, 50vh) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* লোডিং স্ক্রিন */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .soccer-loader {
            width: 60px; height: 60px;
            border: 5px solid #fff;
            border-bottom-color: #0084ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* রেজিস্ট্রেশন ফর্ম */
        .container {
            background: rgba(15, 15, 25, 0.8);
            border: 2px solid #0084ff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 132, 255, 0.5);
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 { margin-bottom: 20px; color: #0084ff; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #333;
            color: #00ff88;
            border-radius: 8px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #0084ff, #00c8ff);
            border: none; color: #fff; font-weight: bold;
            cursor: pointer; border-radius: 8px;
            transition: 0.3s;
        }

        .submit-btn:hover { box-shadow: 0 0 20px #0084ff; }

        /* প্রিমিয়াম কার্ড ডিজাইন */
        #playerCard {
            display: none;
            width: 360px; height: 520px;
            background: #0a0a1a;
            border: 4px solid #0084ff;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 132, 255, 0.6);
            overflow: hidden;
            text-align: center;
        }

        .card-header {
            background: #0084ff; color: #000;
            padding: 10px; font-weight: 900; font-size: 24px;
        }

        .photo-area {
            width: 200px; height: 200px;
            margin: 20px auto;
            border: 4px solid #fff;
            background: #222;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); /* স্টাইলিশ কাট */
        }

        #cardPhoto { width: 100%; height: 100%; object-fit: cover; }

        .info-box {
            text-align: left; padding: 0 40px; margin-top: 10px;
        }

        .info-row { margin-bottom: 10px; border-bottom: 1px solid rgba(0,132,255,0.3); }
        .label { color: #0084ff; font-size: 10px; text-transform: uppercase; }
        .value { font-size: 18px; color: #fff; display: block; padding-bottom: 5px; }

        #qrcode {
            position: absolute; bottom: 20px; right: 20px;
            background: white; padding: 5px; border-radius: 5px;
        }

        .download-btn {
            display: none; margin-top: 20px;
            padding: 15px 30px; background: #00ff88;
            color: #000; font-weight: bold; border-radius: 10px;
            cursor: pointer; border: none;
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" class="football" style="top:10%; left:10%;">
        <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" class="football" style="top:60%; left:70%; animation-delay: 2s;">
    </div>

    <div id="loader">
        <div class="soccer-loader"></div>
        <p style="margin-top:20px; color:#0084ff; letter-spacing:3px;">GENERATING CARD...</p>
    </div>

    <div class="container" id="formContainer">
        <h2>SCLAF PRO</h2>
        <form id="regForm">
            <input type="text" id="pName" placeholder="PLAYER NAME" required>
            <input type="text" id="pDevice" placeholder="DEVICE (e.g. S24 Ultra)" required>
            <input type="text" id="pID" placeholder="USER ID (e.g. 102-394-222)" required>
            <label style="font-size: 11px; color:#666;">PROFILE PHOTO:</label>
            <input type="file" id="pPhoto" accept="image/*" required>
            <button type="submit" class="submit-btn">GET MY PRO CARD</button>
        </form>
    </div>

    <div id="playerCard">
        <div class="card-header">SCLAF TOURNAMENT</div>
        <div class="photo-area">
            <img src="" id="cardPhoto">
        </div>
        <div class="info-box">
            <div class="info-row"><span class="label">Player Name</span><span class="value" id="resName"></span></div>
            <div class="info-row"><span class="label">Device Name</span><span class="value" id="resDevice"></span></div>
            <div class="info-row"><span class="label">eFootball ID</span><span class="value" id="resID"></span></div>
        </div>
        <div id="qrcode"></div>
        <div style="position:absolute; bottom:20px; left:40px; font-size:10px; color:#444;">ID VERIFIED BY SCLAF</div>
    </div>

    <button class="download-btn" id="downloadBtn">DOWNLOAD CARD</button>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // লোডার দেখানো
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';

            setTimeout(() => {
                // ডাটা সেট করা
                document.getElementById('resName').innerText = document.getElementById('pName').value.toUpperCase();
                document.getElementById('resDevice').innerText = document.getElementById('pDevice').value.toUpperCase();
                document.getElementById('resID').innerText = document.getElementById('pID').value;

                // QR Code
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: `SCLAF-PLAYER: ${document.getElementById('pName').value}`,
                    width: 60, height: 60
                });

                // Photo
                const reader = new FileReader();
                reader.onload = function() { document.getElementById('cardPhoto').src = reader.result; }
                reader.readAsDataURL(document.getElementById('pPhoto').files[0]);

                // কার্ড দেখানো
                document.getElementById('loader').style.display = 'none';
                document.getElementById('playerCard').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'block';
            }, 3000); // ৩ সেকেন্ড লোডিং হবে
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            html2canvas(document.getElementById('playerCard')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'SCLAF-PRO-CARD.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        });
    </script>
</body>
</html>
